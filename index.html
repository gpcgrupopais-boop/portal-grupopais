<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Grupo Pais Distribuidora</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    body{
      font-family: Arial;
      background:#f5f7fb;
      margin:0;
    }
    header{
      background:#0b3c8c;
      color:white;
      padding:20px;
      font-size:20px;
      font-weight:bold;
    }
    .container{
      padding:20px;
    }
    .card{
      background:white;
      padding:20px;
      border-radius:10px;
      box-shadow:0 2px 8px rgba(0,0,0,0.05);
      max-width:400px;
      margin:auto;
    }
    input,button{
      width:100%;
      padding:12px;
      margin-top:10px;
      border-radius:6px;
      border:1px solid #ddd;
    }
    button{
      background:#0b3c8c;
      color:white;
      border:none;
      font-weight:bold;
    }
  </style>
</head>

<body>

<header>
Grupo Pais Distribuidora
</header>

<div class="container">
  <div class="card">
    <h3>Portal do Lojista</h3>
    <input placeholder="CNPJ">
    <input placeholder="Senha" type="password">
    <button>Entrar</button>
  </div>
</div>

</body>
</html>
